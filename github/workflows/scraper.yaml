name: Auto Scraper (Every 6 Hours)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Download code
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Scrapy
        run: |
          pip install scrapy

      - name: Run scraper
        run: |
          scrapy crawl mobiles

      - name: Save updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data.db
          git commit -m "auto update data" || echo "No changes"
          git push